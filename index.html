<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SnakeOil — Product Trust Engine</title>

<!-- PWA meta tags -->
<meta name="theme-color" content="#0a0a0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SnakeOil">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b;
    --surface: #111114;
    --surface2: #18181d;
    --border: #2a2a35;
    --accent: #e8ff47;
    --accent2: #ff4747;
    --accent3: #47c8ff;
    --text: #f0f0f0;
    --muted: #6b6b7a;
    --green: #47ff8a;
    --yellow: #ffc947;
    --red: #ff4747;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    min-height: 100vh;
    min-height: 100dvh;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    overflow-x: hidden;
    -webkit-text-size-adjust: 100%;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 16px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: #0a0a0b;
    letter-spacing: -1px;
  }
  .logo-text {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  .logo-sub {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Search bar */
  .search-section {
    padding: 16px 16px 0;
  }
  .search-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .search-row {
    display: flex;
    gap: 8px;
  }
  .search-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--accent); }
  .scan-btn {
    background: var(--accent);
    color: #0a0a0b;
    border: none;
    border-radius: 8px;
    padding: 12px 18px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .scan-btn:hover { opacity: 0.88; }
  .scan-btn:active { transform: scale(0.97); }
  .scan-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Loading state */
  .loading {
    padding: 28px 16px;
    text-align: center;
    display: none;
  }
  .loading.active { display: block; }
  .loading-bar {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .loading-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    animation: load 1.8s ease-in-out infinite;
    width: 40%;
  }
  @keyframes load {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }
  .loading-text {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  /* Content area */
  .content {
    flex: 1;
  }

  /* Results */
  .results { display: none; padding: 14px 16px; }
  .results.active { display: block; }

  /* Trust score */
  .trust-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }
  .trust-block::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--score-color, var(--yellow));
  }
  .trust-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }
  .trust-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .trust-product {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    max-width: 200px;
    line-height: 1.3;
  }
  .trust-score-big {
    font-family: 'Space Mono', monospace;
    font-size: 44px;
    font-weight: 700;
    color: var(--score-color, var(--yellow));
    line-height: 1;
  }
  .trust-score-label {
    font-size: 10px;
    color: var(--muted);
    text-align: right;
    margin-top: 2px;
  }

  /* Meter bar */
  .meter-wrap { margin-bottom: 8px; }
  .meter-track {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .meter-fill {
    height: 100%;
    border-radius: 3px;
    background: var(--score-color, var(--yellow));
    transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .meter-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Verdict pill */
  .verdict {
    display: inline-block;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.04em;
    background: color-mix(in srgb, var(--score-color, var(--yellow)) 15%, transparent);
    color: var(--score-color, var(--yellow));
    border: 1px solid color-mix(in srgb, var(--score-color) 30%, transparent);
    margin-top: 10px;
  }

  /* BS Meter */
  .bs-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .bs-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .section-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
  }
  .bs-pct {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--red);
  }
  .bs-track {
    height: 22px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .bs-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--yellow), var(--red));
    border-radius: 4px;
    transition: width 0.9s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
  }
  .bs-fill::after {
    content: 'SHILL DENSITY';
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    color: rgba(0,0,0,0.7);
    letter-spacing: 0.1em;
    white-space: nowrap;
  }
  .bs-note {
    margin-top: 8px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* Signal flags */
  .flags-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .flags-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .flag-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .flag-item:last-child { border-bottom: none; padding-bottom: 0; }
  .flag-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
  }
  .flag-dot.red { background: var(--red); box-shadow: 0 0 4px var(--red); }
  .flag-dot.yellow { background: var(--yellow); box-shadow: 0 0 4px var(--yellow); }
  .flag-dot.green { background: var(--green); box-shadow: 0 0 4px var(--green); }
  .flag-text { font-size: 13px; color: var(--text); line-height: 1.4; }
  .flag-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* Account breakdown */
  .accounts-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .account-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .account-row:last-child { border-bottom: none; }
  .account-name {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent3);
  }
  .account-meta { font-size: 11px; color: var(--muted); }
  .account-badge {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .badge-red { background: rgba(255,71,71,0.15); color: var(--red); }
  .badge-yellow { background: rgba(255,201,71,0.15); color: var(--yellow); }
  .badge-green { background: rgba(71,255,138,0.15); color: var(--green); }

  /* Empty / idle state */
  .idle {
    padding: 48px 16px;
    text-align: center;
  }
  .idle-icon {
    font-size: 40px;
    margin-bottom: 14px;
    opacity: 0.3;
  }
  .idle-text {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.7;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.04em;
  }

  /* Footer */
  .footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: auto;
  }
  .footer-note {
    font-size: 10px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }
  .threads-count {
    font-size: 10px;
    color: var(--accent);
    font-family: 'Space Mono', monospace;
  }

  /* Safe area for phones with notches/gesture bars */
  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    .footer {
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
    }
    .header {
      padding-top: calc(16px + env(safe-area-inset-top));
    }
  }
</style>
</head>
<body>

<div class="app">

<div class="header">
  <div class="logo">
    <div class="logo-icon">SO</div>
    <div>
      <div class="logo-text">SNAKEOIL</div>
      <div class="logo-sub">Product Trust Engine</div>
    </div>
  </div>
  <div class="status-dot" id="statusDot"></div>
</div>

<div class="content">

<div class="search-section">
  <div class="search-label">Product to investigate</div>
  <div class="search-row">
    <input
      class="search-input"
      type="text"
      id="productInput"
      placeholder="e.g. Triquetra Flora microbiome"
      autocomplete="off"
      autocapitalize="off"
      spellcheck="false"
    />
    <button class="scan-btn" id="scanBtn" onclick="runScan()">SCAN</button>

</div>

<div class="loading" id="loading">
  <div class="loading-bar"><div class="loading-fill"></div></div>
  <div class="loading-text" id="loadingText">PULLING REDDIT THREADS...</div>
</div>

<div class="idle" id="idle">
  <div class="idle-icon">🐍</div>
  <div class="idle-text">Paste a product name<br>to check if it's legit or bullshit</div>
</div>

<div class="results" id="results">

  <div class="trust-block" id="trustBlock">
    <div class="trust-header">
      <div>
        <div class="trust-label">Trust Score</div>
        <div class="trust-product" id="productName">—</div>
      </div>
      <div style="text-align:right">
        <div class="trust-score-big" id="trustScore">—</div>
        <div class="trust-score-label">/ 100</div>
      </div>
    </div>
    <div class="meter-wrap">
      <div class="meter-track">
        <div class="meter-fill" id="trustMeter" style="width:0%"></div>
      </div>
      <div class="meter-labels"><span>SCAM</span><span>SKETCHY</span><span>LEGIT</span></div>
    </div>
    <div class="verdict" id="verdictPill">—</div>
  </div>

  <div class="bs-block">
    <div class="bs-header">
      <div class="section-title">💩 Bullshit Meter</div>
      <div class="bs-pct" id="bsPct">—%</div>
    </div>
    <div class="bs-track">
      <div class="bs-fill" id="bsFill" style="width:0%"></div>
    </div>
    <div class="bs-note" id="bsNote">—</div>
  </div>

  <div class="flags-block">
    <div class="flags-title">⚑ Signal Flags</div>
    <div id="flagsList"></div>
  </div>

  <div class="accounts-block">
    <div class="flags-title">👤 Reviewer Breakdown</div>
    <div id="accountsList"></div>
  </div>

</div>

</div><!-- .content -->

<div class="footer">
  <div class="footer-note" id="footerNote">v0.1 · prototype</div>
  <div class="threads-count" id="threadsCount"></div>
</div>

</div><!-- .app -->

<script>
// ═══════════════════════════════════════════════════════════════
// SNAKEOIL — Product Trust Engine
// Layer 1: Real Reddit API Integration
// ═══════════════════════════════════════════════════════════════

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function setStatus(text) {
  document.getElementById('loadingText').textContent = text;
}

function scoreColor(score) {
  if (score >= 70) return 'var(--green)';
  if (score >= 40) return 'var(--yellow)';
  return 'var(--red)';
}

function verdict(score) {
  if (score >= 75) return '✓ LIKELY LEGIT';
  if (score >= 55) return '⚠ PROCEED WITH CAUTION';
  if (score >= 35) return '✗ HIGH SHILL RISK';
  return '✗✗ PROBABLE SCAM';
}

function formatKarma(n) {
  if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
  return String(n);
}

function accountYear(createdUtc) {
  return new Date(createdUtc * 1000).getFullYear();
}

function daysSince(utcSeconds) {
  return (Date.now() / 1000 - utcSeconds) / 86400;
}

// ── Shill signal patterns ──────────────────────────────────────
const SHILL_NAME_PATTERNS = [/\d{3,}$/, /5star/i, /reviewer/i, /honest.*review/i, /real.*user/i, /wellness/i, /health.*daily/i, /boost/i];
const SUSPECT_SUBS = new Set(['micro_saas', 'entrepreneur', 'affiliatemarketing', 'dropship', 'sidehustle', 'passive_income', 'beermoney']);
const SUPP_KEYWORDS = /microbiome|probiotic|collagen|detox|cleanse|flora|gut|boost|immune|keto|glow|beauty|skin|hair|supplement|vitamin|nootropic|ashwagandha|turmeric|cbd|mushroom.*extract/i;

// ── Reddit API helpers ─────────────────────────────────────────
const REDDIT_BASE = 'https://www.reddit.com';
const UA_HEADER = { headers: { 'User-Agent': 'web:SnakeOil:v0.1 (Product Trust Engine)' } };

async function redditFetch(url) {
  const res = await fetch(url, UA_HEADER);
  if (res.status === 429) {
    // Rate limited — wait and retry once
    await sleep(2000);
    const retry = await fetch(url, UA_HEADER);
    if (!retry.ok) throw new Error(`Reddit API ${retry.status}`);
    return retry.json();
  }
  if (!res.ok) throw new Error(`Reddit API ${res.status}`);
  return res.json();
}

// Search Reddit for threads mentioning the product
async function searchRedditThreads(query) {
  const encoded = encodeURIComponent(query);
  const data = await redditFetch(
    `${REDDIT_BASE}/search.json?q=${encoded}&sort=relevance&limit=25&type=link`
  );
  return data.data.children.map(c => c.data);
}

// Fetch comments from a thread to find unique authors
async function fetchThreadComments(permalink) {
  try {
    const data = await redditFetch(`${REDDIT_BASE}${permalink}.json?limit=50&depth=3&sort=top`);
    const comments = [];
    function walk(children) {
      if (!children) return;
      for (const c of children) {
        if (c.kind === 't1' && c.data.author && c.data.author !== '[deleted]' && c.data.author !== 'AutoModerator') {
          comments.push({
            author: c.data.author,
            body: c.data.body || '',
            score: c.data.score || 0,
            created: c.data.created_utc || 0
          });
        }
        if (c.data.replies && c.data.replies.data) {
          walk(c.data.replies.data.children);
        }
      }
    }
    if (data[1] && data[1].data) walk(data[1].data.children);
    return comments;
  } catch {
    return [];
  }
}

// Fetch user account metadata
async function fetchUserProfile(username) {
  try {
    const data = await redditFetch(`${REDDIT_BASE}/user/${encodeURIComponent(username)}/about.json`);
    return data.data;
  } catch {
    return null;
  }
}

// ── Account analysis ───────────────────────────────────────────
function analyzeAccount(profile) {
  if (!profile) return { badge: 'UNKNOWN', badgeClass: 'badge-yellow', shillScore: 0.5, flags: [] };

  const flags = [];
  let shillScore = 0;
  const ageDays = daysSince(profile.created_utc);
  const karmaPerDay = profile.total_karma / Math.max(ageDays, 1);
  const year = accountYear(profile.created_utc);

  // Account age check
  if (ageDays < 30) {
    shillScore += 0.3;
    flags.push({ color: 'red', text: `Brand new account (${Math.floor(ageDays)} days old)`, sub: 'Accounts under 30 days are high risk for astroturfing' });
  } else if (ageDays < 180) {
    shillScore += 0.15;
    flags.push({ color: 'yellow', text: `Young account (${Math.floor(ageDays / 30)} months old)`, sub: 'Newer accounts warrant extra scrutiny' });
  }

  // Karma velocity — the bayouboi888 signal
  // Normal active user: 5-50+ karma/day. Shell accounts: <1 karma/day over years
  if (ageDays > 365 && karmaPerDay < 1) {
    shillScore += 0.25;
    flags.push({ color: 'red', text: `Aged shell account pattern — ${karmaPerDay.toFixed(2)} karma/day`, sub: `${year} account with only ${formatKarma(profile.total_karma)} karma across ${Math.floor(ageDays / 365)}+ years` });
  } else if (ageDays > 180 && karmaPerDay < 2) {
    shillScore += 0.1;
    flags.push({ color: 'yellow', text: `Low activity account — ${karmaPerDay.toFixed(1)} karma/day`, sub: 'Below typical engagement for an active Reddit user' });
  }

  // Display name vs username mismatch (the "5StarScalper888" signal)
  const displayName = profile.subreddit?.title || profile.subreddit?.display_name_prefixed || '';
  if (displayName && displayName.toLowerCase().replace(/[^a-z0-9]/g, '') !== profile.name.toLowerCase().replace(/[^a-z0-9]/g, '')) {
    // Check if the display name itself is suspicious
    const dnLower = displayName.toLowerCase();
    if (/5star|shill|scalp|fake|review|honest|real/i.test(dnLower)) {
      shillScore += 0.2;
      flags.push({ color: 'red', text: `Suspicious display name: "${displayName}"`, sub: `Username is u/${profile.name} — mismatch with promotional display name` });
    } else {
      // Normal display name mismatch isn't inherently suspicious
    }
  }

  // Shill naming patterns in username
  let nameHits = 0;
  SHILL_NAME_PATTERNS.forEach(p => { if (p.test(profile.name)) nameHits++; });
  if (nameHits >= 2) {
    shillScore += 0.2;
    flags.push({ color: 'red', text: `Username matches shill naming patterns`, sub: `u/${profile.name} hits ${nameHits} known suspicious patterns` });
  } else if (nameHits === 1) {
    shillScore += 0.05;
  }

  // Very low comment karma relative to link karma can indicate link spam
  if (profile.link_karma > 500 && profile.comment_karma < profile.link_karma * 0.1) {
    shillScore += 0.1;
    flags.push({ color: 'yellow', text: 'Link karma >> comment karma', sub: `${formatKarma(profile.link_karma)} link vs ${formatKarma(profile.comment_karma)} comment — possible link spam pattern` });
  }

  // Determine badge
  let badge, badgeClass;
  if (shillScore >= 0.5) {
    badge = 'SHILL';
    badgeClass = 'badge-red';
  } else if (shillScore >= 0.35) {
    badge = 'SHELL';
    badgeClass = 'badge-red';
  } else if (shillScore >= 0.15) {
    badge = 'SUSPECT';
    badgeClass = 'badge-yellow';
  } else {
    badge = 'LEGIT';
    badgeClass = 'badge-green';
  }

  return {
    badge, badgeClass, shillScore, flags,
    meta: `${year} · ${formatKarma(profile.total_karma)} karma`
  };
}

// ── Coordinated posting detection ──────────────────────────────
function detectCoordination(comments, threadDates) {
  // Check if multiple accounts posted in the same subreddits within the same week
  const authorsByWeek = {};
  comments.forEach(c => {
    const week = Math.floor(c.created / (7 * 86400));
    if (!authorsByWeek[week]) authorsByWeek[week] = new Set();
    authorsByWeek[week].add(c.author);
  });

  let maxSameWeek = 0;
  for (const week in authorsByWeek) {
    maxSameWeek = Math.max(maxSameWeek, authorsByWeek[week].size);
  }

  return maxSameWeek;
}

// ── Main analysis engine ───────────────────────────────────────
async function analyzeProduct(name) {
  const isSupp = SUPP_KEYWORDS.test(name);
  const flags = [];
  const accounts = [];
  let threadCount = 0;

  // ── Step 1: Search Reddit ──
  setStatus('SEARCHING REDDIT...');
  let threads;
  try {
    threads = await searchRedditThreads(name);
    threadCount = threads.length;
  } catch (err) {
    // API failed — fall back to heuristic-only mode
    flags.push({ color: 'yellow', text: 'Reddit API unavailable', sub: 'Could not reach Reddit — showing heuristic analysis only. Try again shortly.' });
    return fallbackAnalysis(name, isSupp, flags);
  }

  if (threads.length === 0) {
    flags.push({ color: 'red', text: 'Zero Reddit threads found', sub: 'No organic discussion exists for this product — major red flag' });
    const score = isSupp ? 15 : 30;
    return { score, bsLevel: isSupp ? 90 : 70, flags, accounts, threadCount: 0 };
  }

  // Category flag
  if (isSupp) {
    flags.push({ color: 'red', text: 'Supplement/wellness category', sub: 'Highest-risk category for Reddit astroturfing' });
  }

  // ── Step 2: Collect unique authors from top threads ──
  setStatus('FETCHING THREAD COMMENTS...');
  const allComments = [];
  const authorSet = new Set();
  const threadsToScan = threads.slice(0, 5); // Top 5 threads

  for (const thread of threadsToScan) {
    // Also add thread author (OP)
    if (thread.author && thread.author !== '[deleted]') {
      authorSet.add(thread.author);
    }
    const comments = await fetchThreadComments(thread.permalink);
    comments.forEach(c => {
      allComments.push(c);
      authorSet.add(c.author);
    });
    await sleep(200); // Gentle rate limiting
  }

  // Check subreddit concentration
  const subCounts = {};
  threads.forEach(t => {
    subCounts[t.subreddit] = (subCounts[t.subreddit] || 0) + 1;
  });
  const uniqueSubs = Object.keys(subCounts);
  if (uniqueSubs.length <= 2 && threads.length >= 3) {
    flags.push({ color: 'yellow', text: `All discussion in ${uniqueSubs.length} subreddit${uniqueSubs.length > 1 ? 's' : ''}: r/${uniqueSubs.join(', r/')}`, sub: 'Organic products get discussed across many communities' });
  }

  // ── Step 3: Analyze unique accounts ──
  setStatus('ANALYZING REVIEWER ACCOUNTS...');
  const uniqueAuthors = [...authorSet].slice(0, 10); // Cap at 10 to avoid rate limits
  let shillCount = 0;
  let suspectCount = 0;
  let legitCount = 0;
  const allAccountFlags = [];

  for (const username of uniqueAuthors) {
    setStatus(`CHECKING u/${username}...`);
    const profile = await fetchUserProfile(username);
    const analysis = analyzeAccount(profile);

    accounts.push({
      name: `u/${username}`,
      meta: analysis.meta || 'unknown',
      badge: analysis.badge,
      badgeClass: analysis.badgeClass
    });

    if (analysis.badge === 'SHILL') shillCount++;
    else if (analysis.badge === 'SHELL') shillCount++;
    else if (analysis.badge === 'SUSPECT') suspectCount++;
    else legitCount++;

    allAccountFlags.push(...analysis.flags);
    await sleep(300); // Rate limit between user lookups
  }

  // ── Step 4: Coordinated posting check ──
  setStatus('CHECKING COORDINATION...');
  const sameWeekCount = detectCoordination(allComments, threads);
  if (sameWeekCount >= 3) {
    flags.push({ color: 'red', text: 'Coordinated posting pattern detected', sub: `${sameWeekCount} accounts posted about this in the same week window` });
  }

  // ── Step 5: Compute scores ──
  setStatus('COMPUTING TRUST SCORE...');

  // Base score
  let score = isSupp ? 35 : 60;

  // Thread volume adjustment
  if (threads.length < 3) {
    score -= 10;
    flags.push({ color: 'yellow', text: `Low discussion volume (${threads.length} thread${threads.length > 1 ? 's' : ''})`, sub: 'Legitimate products typically generate more organic discussion' });
  } else if (threads.length >= 15) {
    score += 5;
  }

  // Account quality adjustment
  const totalAnalyzed = shillCount + suspectCount + legitCount;
  const shillRatio = totalAnalyzed > 0 ? shillCount / totalAnalyzed : 0;
  const suspectRatio = totalAnalyzed > 0 ? suspectCount / totalAnalyzed : 0;

  score -= Math.round(shillRatio * 40); // Shills tank the score hard
  score -= Math.round(suspectRatio * 15);
  score += Math.round((legitCount / Math.max(totalAnalyzed, 1)) * 15);

  // Coordination penalty
  if (sameWeekCount >= 3) score -= 15;
  if (sameWeekCount >= 5) score -= 10;

  // Subreddit concentration penalty
  if (uniqueSubs.length <= 2 && threads.length >= 3) score -= 10;

  // Clamp
  score = Math.max(0, Math.min(100, score));

  // Bullshit meter = percentage of sketchy reviewers
  const bsLevel = totalAnalyzed > 0
    ? Math.round(((shillCount + suspectCount * 0.5) / totalAnalyzed) * 100)
    : (isSupp ? 70 : 40);

  // Add the most important per-account flags (up to 4)
  const topFlags = allAccountFlags
    .filter(f => f.color === 'red')
    .slice(0, 4);
  flags.push(...topFlags);

  // Summary flags
  if (shillCount > 0) {
    flags.push({ color: 'red', text: `${shillCount} of ${totalAnalyzed} reviewers flagged as shill/shell`, sub: 'These accounts show patterns consistent with paid or fake promotion' });
  }
  if (legitCount > 0 && legitCount > shillCount) {
    flags.push({ color: 'green', text: `${legitCount} of ${totalAnalyzed} reviewers appear legitimate`, sub: 'Established accounts with normal engagement patterns' });
  }

  return { score, bsLevel, flags, accounts, threadCount };
}

// Fallback when Reddit API is unreachable
function fallbackAnalysis(name, isSupp, flags) {
  if (isSupp) {
    flags.push({ color: 'red', text: 'Supplement/wellness category', sub: 'Highest-risk category for Reddit astroturfing' });
  }
  flags.push({ color: 'yellow', text: 'Heuristic analysis only', sub: 'Could not verify against live Reddit data' });
  return {
    score: isSupp ? 30 : 50,
    bsLevel: isSupp ? 65 : 40,
    flags,
    accounts: [],
    threadCount: 0
  };
}

// ── UI: Run scan ───────────────────────────────────────────────
async function runScan() {
  const name = document.getElementById('productInput').value.trim();
  if (!name) return;

  document.getElementById('idle').style.display = 'none';
  document.getElementById('results').classList.remove('active');
  const loading = document.getElementById('loading');
  loading.classList.add('active');
  document.getElementById('scanBtn').disabled = true;

  let data;
  try {
    data = await analyzeProduct(name);
  } catch (err) {
    setStatus('ERROR — RETRYING...');
    await sleep(1000);
    try {
      data = await analyzeProduct(name);
    } catch {
      data = fallbackAnalysis(name, SUPP_KEYWORDS.test(name), [
        { color: 'red', text: 'Analysis failed', sub: 'Reddit may be blocking requests. Try again in a minute.' }
      ]);
    }
  }

  loading.classList.remove('active');

  // Apply score color
  const color = scoreColor(data.score);
  document.getElementById('trustBlock').style.setProperty('--score-color', color);

  // Populate trust score
  document.getElementById('productName').textContent = name;
  document.getElementById('trustScore').textContent = data.score;
  document.getElementById('trustScore').style.color = color;
  document.getElementById('trustMeter').style.width = data.score + '%';
  document.getElementById('trustMeter').style.background = color;
  document.getElementById('verdictPill').textContent = verdict(data.score);
  document.getElementById('verdictPill').style.setProperty('--score-color', color);

  // BS meter
  document.getElementById('bsPct').textContent = data.bsLevel + '%';
  document.getElementById('bsFill').style.width = data.bsLevel + '%';
  document.getElementById('bsNote').textContent =
    data.bsLevel > 70
      ? `${data.bsLevel}% of analyzed reviewers show shill signals. Do not trust positive reviews without independent verification.`
      : data.bsLevel > 40
        ? `${data.bsLevel}% shill signal density — moderate. Cross-check with verified purchase reviews elsewhere.`
        : `${data.bsLevel}% shill signal density — relatively clean. Still verify independently.`;

  // Flags
  const flagsList = document.getElementById('flagsList');
  flagsList.innerHTML = '';
  data.flags.forEach(f => {
    flagsList.innerHTML += `
      <div class="flag-item">
        <div class="flag-dot ${f.color}"></div>
        <div>
          <div class="flag-text">${f.text}</div>
          <div class="flag-sub">${f.sub}</div>
        </div>
      </div>`;
  });

  // Accounts
  const accountsList = document.getElementById('accountsList');
  accountsList.innerHTML = '';
  if (data.accounts.length === 0) {
    accountsList.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:8px 0;">No reviewer accounts analyzed</div>';
  } else {
    data.accounts.forEach(a => {
      accountsList.innerHTML += `
        <div class="account-row">
          <div>
            <div class="account-name">${a.name}</div>
            <div class="account-meta">${a.meta}</div>
          </div>
          <div class="account-badge ${a.badgeClass}">${a.badge}</div>
        </div>`;
    });
  }

  document.getElementById('threadsCount').textContent =
    data.threadCount > 0 ? `${data.threadCount} THREADS FOUND` : 'NO THREADS';
  document.getElementById('footerNote').textContent =
    `scanned ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;

  document.getElementById('results').classList.add('active');
  document.getElementById('scanBtn').disabled = false;
}

// ── Init ───────────────────────────────────────────────────────
document.getElementById('productInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') runScan();
});

// Register service worker for PWA install
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
